{% extends 'base.html' %}
{% block title %}Eliminar Cliente{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card stat-card">
      <div class="card-body text-center p-5">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3.5rem"></i>
        <h4 class="mt-3 fw-bold">¿Eliminar cliente?</h4>
        <p class="text-muted">Se eliminará a <strong>{{ object.nombre }}</strong> y todas sus cotizaciones asociadas.</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-4">
          {% csrf_token %}
          <a href="{% url 'cliente_list' %}" class="btn btn-light px-4">Cancelar</a>
          <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i>Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
