{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión · GCinsumos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 60%, #4f8ef7 100%); min-height: 100vh; display:flex; align-items:center; }
  .login-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,.25); max-width: 400px; width: 100%; }
  .login-card .card-body { padding: 2.5rem; }
  .login-logo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid #e8f0fe; }
  .form-control:focus { border-color: #4f8ef7; box-shadow: 0 0 0 3px rgba(79,142,247,.2); }
  .btn-login { background: linear-gradient(90deg, #1e3c72, #2a5298); border: none; border-radius: 10px; padding: .7rem; font-weight: 600; }
  .btn-login:hover { background: linear-gradient(90deg, #2a5298, #4f8ef7); }
</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-6 col-lg-4">
      <div class="card login-card">
        <div class="card-body">
          <div class="text-center mb-4">
            <img src="{% static 'images/logo.png' %}" alt="Logo" class="login-logo mb-3">
            <h4 class="fw-bold" style="color:#1e3c72">GCinsumos</h4>
            <p class="text-muted small">Sistema de Cotizaciones</p>
          </div>
          {% if form.errors %}
          <div class="alert alert-danger py-2 small">Usuario o contraseña incorrectos.</div>
          {% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold small">Usuario</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Tu usuario" autofocus required>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold small">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Tu contraseña" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100 text-white">
              <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
          </form>
        </div>
      </div>
      <p class="text-center text-white-50 small mt-3">© {% now "Y" %} GCinsumos · Soft Division</p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
