name: Django CI

on:
  push:
    branches: [ main, Cd ]
  pull_request:
    branches: [ main, Cd ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generar archivos estaticos
      run: |
        mkdir -p backend/staticfiles
        SECRET_KEY=ci-build-secret-key DEBUG=True \
          python backend/manage.py collectstatic --noinput

    - name: Correr la suite de pruebas
      run: |
        PYTHONPATH=backend DJANGO_SETTINGS_MODULE=proyecto.test_settings \
          DEBUG=True SECRET_KEY=ci-test-secret-key \
          python -m pytest
